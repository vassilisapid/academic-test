# Vassilis Apidopoulos — Academic Pages configuration
# Copy this over the default _config.yml after creating the site from academicpages/academicpages.github.io.

locale: "en-US"
site_theme: "air" # options in Academic Pages include: default, air, sunrise, mint, dirt, contrast

title: "Vassilis Apidopoulos"
title_separator: "-"
name: &name "Vassilis Apidopoulos"
description: &description "Academic homepage of Vassilis Apidopoulos"
url: "https://vassilisapid.github.io"
baseurl: "/academic-test"
repository: "vassilisapid/vassilisapid.github.io"

# Author sidebar
# The avatar should be copied to images/photoVassi.jpg
author:
  avatar: "photoVassi.jpg"
  name: "Vassilis Apidopoulos"
  bio: "Post-doctoral researcher in optimization, machine learning, and inverse problems."
  location: "Marousi, Greece"
  employer: "Archimedes RU, Athena RC"
  uri: "https://vassilisapid.github.io"
  email:

  academia:
  arxiv:
  googlescholar: "https://scholar.google.fr/citations?user=1IvkI3YAAAAJ&hl=en"
  inspire-hep:
  impactstory:
  orcid:
  semantic:
  ssrn:
  pubmed:
  researchgate:
  scopus:
  zotero:

  bitbucket:
  codepen:
  dribbble:
  github: "vassilisapid"
  kaggle:
  stackoverflow:

  bluesky:
  facebook:
  flickr:
  foursquare:
  goodreads:
  google_plus:
  keybase:
  instagram:
  lastfm:
  linkedin:
  mastodon:
  medium:
  pinterest:
  soundcloud:
  steam:
  telegram:
  tumblr:
  twitter:
  vine:
  weibo:
  wikipedia:
  xing:
  youtube:
  zhihu:

publication_category:
  manuscripts:
    title: "Journal Articles and Preprints"
  conferences:
    title: "Conference Papers"

teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider:

atom_feed:
  hide: false
  path:

analytics:
  provider: "false"

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Europe/Athens

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
