<style>
/* Right-side coloured bundle */
.right-color-bundle {
  position: fixed;
  top: 0;
  right: 0;
  width: 16px;
  height: 100vh;
  z-index: 999;
  pointer-events: none;

  background:
    linear-gradient(
      to bottom,
      #2f80ed 0%,
      #2f80ed 16%,
      #27ae60 16%,
      #27ae60 32%,
      #f2c94c 32%,
      #f2c94c 48%,
      #f2994a 48%,
      #f2994a 64%,
      #eb5757 64%,
      #eb5757 80%,
      #9b51e0 80%,
      #9b51e0 100%
    );
}

/* Give the page a little breathing room so the strip does not feel attached to text */
body {
  padding-right: 16px;
}

/* Hide it on small screens */
@media screen and (max-width: 768px) {
  .right-color-bundle {
    display: none;
  }

  body {
    padding-right: 0;
  }
}

/* Slightly soften it in dark mode */
@media (prefers-color-scheme: dark) {
  .right-color-bundle {
    opacity: 0.75;
  }
}
</style>

<div class="right-color-bundle"></div>
